<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container text-center">

        <h1>Control de vehículos</h1>

        <input type="text" id="nombre" placeholder="Nombre del vehiculo">
        <input type="number" id="velocidad" placeholder="Velocidad inicial">
        <input type="number" id="cantidad" placeholder="Cantidad">

        <div class="botones">
            <button id="btnCrear" class="btn-ejercicio">Crear</button>
            <button id="btnAcelerar" class="btn-ejercicio">Acelerar</button>
            <button id="btnFrenar" class="btn-ejercicio">Frenar</button>
            <button id="btnMostrarEstado" class="btn-ejercicio">Mostrar estado</button>
            
        </div>

        <p id="resultado"></p>

    </div>

    <script src="script.js"></script>

</body>
</html>
