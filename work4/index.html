<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container text-center">

        <h1>Carrito de compras</h1>

        <input type="text" id="nombre" placeholder="Nombre del producto">
        <input type="number" id="precio" placeholder="Precio">
        <input type="text" id="nombreEliminar" placeholder="Nombre a eliminar">

        <div class="botones">
            <button id="btnAgregar" class="btn-ejercicio">Agregar</button>
            <button id="btnEliminar" class="btn-ejercicio">Eliminar</button>
            <button id="btnCalcularTotal" class="btn-ejercicio">Calcular total</button>
        </div>

        <p id="resultado"></p>

    </div>

    <script src="script.js"></script>

</body>
</html>
