<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta Bancaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container text-center">

        <h1>Sistema de cuentas bancarias</h1>

        <input type="text" id="titular" placeholder="Nombre del titular">
        <input type="number" id="saldo" placeholder="Saldo inicial">
        <input type="number" id="monto" placeholder="Monto a depositar o retirar">

        <div class="botones">
            <button id="btnCrear" class="btn-ejercicio">Crear cuenta</button>
            <button id="btnDepositar" class="btn-ejercicio">Depositar</button>
            <button id="btnRetirar" class="btn-ejercicio">Retirar</button>
            <button id="btnConsultar" class="btn-ejercicio">Consultar saldo</button>
        </div>

        <p id="resultado"></p>

    </div>

    <script src="script.js"></script>

</body>
</html>
