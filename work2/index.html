<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta Bancaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container text-center">

        <h1>Inventario de tienda</h1>

        <input type="text" id="nombre" placeholder="Nombre">
        <input type="number" id="precio" placeholder="Precio">
        <input type="number" id="cantidad" placeholder="Cantidad">

        <div class="botones">
            <button id="btnRegistrar" class="btn-ejercicio">Registrar</button>
            <button id="btnConsultar" class="btn-ejercicio">Consultar</button>
            <button id="btnCalcularValorTotal" class="btn-ejercicio">Calcular valor total</button>
        </div>

        <p id="resultado"></p>

    </div>

    <script src="script.js"></script>

</body>
</html>
